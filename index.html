<!DOCTYPE html>
<html lang="pt-br">
<head>
    <header>
        <h1>Pesquisa Online</h1>
    </header>
    <section>
            <form action="">
                    
                <!--Dados pessoais-->
                    
                <fieldset>    
                    <legend>Dados Pessoais</legend>
                        <label for="username">Nome</label>
                        <input type="text" name="username"required >
                        <br>
                        <label for="age">Idade</label>
                        <input type="number" name="age" required>
                        <br>
                        <label for="birthday">Data de Nascimento</label>
                        <input type="date" name="birthday">
                        <br>
                        <label for="userEmail">Email</label>
                        <input type="email" name="userEmail" required>
                        <br>
                        <label for="phonenumber">Telefone</label>
                        <input type="number" name="phonenumber" pattern="[0-9]{2} [0-9]{5}-[0-9]{4}" placeholder="XX XXXXX-XXXX" required>
                        <br>
                        <label for="userimage">Anexar Imagem</label>
                        <input type="file" accept="image/*" name="userimage" >
                        <br>
                    



                        <button type="submit">Enviar</button></fieldset>
                    
                    
            </form>


    </section>
    
    
    
    
    
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa Culturama</title>
</head>

</body>
</html>
